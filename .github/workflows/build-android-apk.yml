##############################################################################
# Build an installable Android APK in the cloud — no Android Studio needed.
#
# HOW TO USE (one-time setup):
#   1. Create a repo on github.com and upload this whole project folder
#   2. Go to the repo → "Actions" tab → "Build Android APK" → "Run workflow"
#   3. Wait ~10-15 minutes
#   4. Download "TransparentFit-APK" from the run's Artifacts section
#   5. Copy app-release.apk to your phone and install it
#      (you may need to allow "install from unknown sources")
#
# The workflow also runs automatically on every push to main.
##############################################################################

name: Build Android APK

on:
  workflow_dispatch:        # manual "Run workflow" button
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'android/**'
      - 'App.tsx'
      - 'index.js'
      - 'package.json'
      - '.github/workflows/build-android-apk.yml'

permissions:
  contents: write   # needed so the workflow can publish/update the GitHub Release below

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Install JS dependencies
        run: npm install --no-audit --no-fund
        env:
          CI: true

      - name: Emit diagnostics as annotations (readable via API without auth)
        run: |
          RN_VER=$(node -e "console.log(require('react-native/package.json').version)" 2>&1 || echo MISSING)
          echo "::warning::RN_VERSION=$RN_VER"
          GP_VER=$(node -e "console.log(require('@react-native/gradle-plugin/package.json').version)" 2>&1 || echo MISSING)
          echo "::warning::GRADLE_PLUGIN_VERSION=$GP_VER"
          RS=$(find node_modules/@react-native/gradle-plugin -iname "*ReactSettings*" 2>/dev/null | head -5 | tr '\n' '~')
          echo "::warning::REACTSETTINGS_FILES=${RS:-none}"
          CLI=$(ls node_modules/@react-native-community/ 2>/dev/null | tr '\n' '~')
          echo "::warning::RN_COMMUNITY_SCOPE=${CLI:-none}"
          GPKG=$(ls node_modules/@react-native/gradle-plugin/ 2>/dev/null | tr '\n' '~')
          echo "::warning::GRADLE_PLUGIN_DIR=${GPKG:-none}"
          SETTINGS=$(cat android/settings.gradle | tr '\n' '~')
          echo "::warning::SETTINGS_GRADLE=${SETTINGS}"

      - name: Generate debug keystore (used to sign the APK)
        run: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Transparent Fit Debug,O=TransparentFit,C=IL"

      - name: Build release APK
        run: |
          set +e
          gradle -p android assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            echo "=== build failed, emitting error lines as annotations ==="
            grep -nE "FAILURE:|What went wrong|Caused by|> Task .*FAILED|^e: |error: |A problem occurred|Could not|Execution failed|> [A-Z]" /tmp/build.log \
              | tail -40 \
              | while IFS= read -r line; do
                  clean=$(printf '%s' "$line" | tr -d '\r' | cut -c1-380)
                  echo "::error::$clean"
                done
          fi
          exit $STATUS
        env:
          CI: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TransparentFit-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish/update "latest" GitHub Release with the APK attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Latest build
          body: Auto-built from the latest push/run. Download app-release.apk below.
          files: android/app/build/outputs/apk/release/app-release.apk
