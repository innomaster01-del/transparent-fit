# JVM
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g

# AndroidX
android.useAndroidX=true
android.enableJetifier=true

# Only build native code for common device ABIs (drop x86 to shrink APK)
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86_64

# New architecture off for v1 — all libs here are stable on the old arch
newArchEnabled=false

# Hermes JS engine (faster startup, smaller memory)
hermesEnabled=true
