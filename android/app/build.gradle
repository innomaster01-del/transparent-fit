apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native Gradle plugin config.
 * Autolinking picks up every RN dependency in package.json automatically.
 */
react {
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (jsc). Irrelevant when Hermes is on.
 */
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.transparentfit"
    defaultConfig {
        applicationId "com.transparentfit"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }
    signingConfigs {
        debug {
            // The debug keystore is generated by CI (or `npm run keystore`) —
            // see .github/workflows/build-android-apk.yml
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Signed with the debug key so the APK is directly installable
            // (sideload / internal testing). For Play Store upload, replace
            // with a proper upload keystore — see tickets/16-play-store-submission.md
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")

    // ML Kit on-device person segmentation (free, ~5MB)
    implementation 'com.google.mlkit:segmentation-selfie:16.0.0-beta6'

    // ML Kit on-device pose detection (free, ~5MB)
    implementation 'com.google.mlkit:pose-detection:18.0.0-beta5'

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
